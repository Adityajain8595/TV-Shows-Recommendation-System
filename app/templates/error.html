{% extends "base.html" %}

{% block title %}Error - TV Show Recommender{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 text-center">
            <i class="fas fa-tv fa-4x text-danger mb-4"></i>
            <h1 class="display-4">Oops!</h1>
            <p class="lead">{{ message }}</p>
            <a href="{{ url_for('main.recommend') }}" class="btn btn-primary btn-lg mt-3">
                <i class="fas fa-search me-2"></i>Try Another Show
            </a>
        </div>
    </div>
</div>
{% endblock %}
